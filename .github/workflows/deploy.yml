name: Deploy to Azure App Service

on:
  push:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify secrets exist
        run: |
          echo "ACR_LOGIN_SERVER set: ${{ secrets.ACR_LOGIN_SERVER != '' }}"
          echo "ACR_USERNAME set: ${{ secrets.ACR_USERNAME != '' }}"
          echo "ACR_PASSWORD set: ${{ secrets.ACR_PASSWORD != '' }}"
          echo "AZURE_CREDENTIALS set: ${{ secrets.AZURE_CREDENTIALS != '' }}"

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/larisin-ai-backend:latest

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: larisin-ai-backend
          images: ${{ secrets.ACR_LOGIN_SERVER }}/larisin-ai-backend:latest

      - name: Azure logout
        run: az logout
